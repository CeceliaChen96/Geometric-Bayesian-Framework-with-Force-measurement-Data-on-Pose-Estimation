name: Python reproducibility checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile Python entry points
        run: |
          python -m py_compile \
            experiments/common.py \
            experiments/make_data_manifest.py \
            experiments/summarize_paper_results.py \
            experiments/run_smoke_demos.py

      - name: Import package
        run: |
          python -c "import mfg_pose_estimation; print('import ok')"

      - name: Rebuild generated-data summaries
        run: |
          python experiments/make_data_manifest.py
          python experiments/summarize_paper_results.py

      - name: Run lightweight smoke demo
        env:
          MPLBACKEND: Agg
        run: |
          python experiments/run_smoke_demos.py --skip-alg2
